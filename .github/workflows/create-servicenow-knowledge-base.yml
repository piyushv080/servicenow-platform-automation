name: Create ServiceNow Knowledge Base Files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-knowledge-base:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: dev
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create directory structure
        run: mkdir -p docs/certifications

      - name: Create CIS-ITOM Quick Reference
        run: |
          python3 << 'PYEOF'
          import os
          os.makedirs('docs/certifications', exist_ok=True)
          lines = [
              '# ServiceNow CIS-ITOM -- Quick Reference Guide',
              '',
              '## 1. IRE Operations -- Know These Cold',
              '',
              '| Trigger Word | Answer |',
              '|---|---|',
              '| No duplicate created | IRE Identification Rule working |',
              '| Source not trusted | Reconciliation Rule priority |',
              '| Non-CMDB table | Add to property + CI Identifiers module |',
              '| Transform Map duplicates | Call CMDBTransformUtil().identifyAndReconcile() |',
              '',
              '## 2. Business Application vs Application Service',
              '',
              '| Keyword | Answer |',
              '|---|---|',
              '| logical portfolio cost risk lifecycle | Business Application (ONE per app) |',
              '| running production operational instance | Application Service (MANY per app) |',
              '| used on Incident | Application Service ALWAYS |',
              '',
              '## 3. CSDM Maturity',
              '',
              '| Stage | Signal |',
              '|---|---|',
              '| Foundation | Do we have data? |',
              '| Crawl | App Service linked to Business App |',
              '| Walk | Technical Services Dynamic CI Groups Offerings |',
              '| Run | Incident/Change/Problem integrated |',
              '| Fly | Business capabilities cost risk alignment |',
              '',
              '## 4. Compliance Score = 0 Trap',
              '',
              'Only Desired State Audit and Scripted Audit feed CMDB Health Compliance score.',
              'Any other audit type = score stays 0.',
              '',
              '## 5. Duplicate Remediation Not Working Trap',
              '',
              'Remediation only works on CIs flagged by IRE where discovery_source = duplicate.',
              'Manually created CIs = remediation will never find them.',
              '',
              '## 6. CMDB Data Manager Trigger Words',
              '',
              '| Trigger | Answer |',
              '|---|---|',
              '| after X months | CMDB Data Manager |',
              '| approval required | Attestation Policy |',
              '| retire stale CIs | CMDB Data Manager |',
              '| archive records | CMDB Data Manager |',
              '',
              'NOT a Scheduled Job. NOT Discovery. NOT Remediation.',
              '',
              '## 7. ACC Security Allow List',
              '',
              'Agent installed + policy active + script denied = script NOT on ACC Security Allow List.',
              '',
              '## 8. System Properties',
              '',
              '| Property | Value | Effect |',
              '|---|---|---|',
              '| glide.required.attribute.enabled | false | Discovery failing fast fix |',
              '| glide.identification_engine.multisource_enabled | true | Enable CMDB 360 |',
              '| glide.class.switch.enabled | false | Creates reclassification tasks |',
              '| glide.identification_engine.non_cmdb_tables | table list | Non-CMDB IRE support |',
              '',
              '## 9. Static vs Dynamic Reconciliation',
              '',
              '| Type | Logic | Requires |',
              '|---|---|---|',
              '| Static | WHO sent the data (source priority number) | Priority rankings |',
              '| Dynamic | WHAT the data says (most reported largest smallest) | Multisource CMDB |',
              '',
              '## 10. Discovery 4 Phases',
              '',
              '| Phase | Name | What Happens |',
              '|---|---|---|',
              '| 1 | Scan | Find active IPs |',
              '| 2 | Classify | What type of device |',
              '| 3 | Identify | Collect unique attributes |',
              '| 4 | Explore | Full CI details - send to IRE |',
          ]
          with open('docs/certifications/CIS-ITOM-Quick-Reference.md', 'w') as f:
              f.write('\n'.join(lines) + '\n')
          print('Created: CIS-ITOM-Quick-Reference.md')
          PYEOF

      - name: Create CMDB Health Lab Reference
        run: |
          python3 << 'PYEOF'
          lines = [
              '# ServiceNow CMDB Health Lab Reference (Yokohama)',
              '',
              '## Lab Overview',
              '',
              '| Field | Value |',
              '|---|---|',
              '| Course | CMDB Health Micro-Certification Simulator (Yokohama) |',
              '| Role | CMDB Administrator (Cloud Dimensions) |',
              '| Goal | Configure Completeness Compliance Correctness scorecards |',
              '',
              '---',
              '',
              '## TASK 1 - Scheduled Jobs (Twice Daily 7AM and 7PM)',
              '',
              'Navigation: All -> Scheduled Script Executions',
              '',
              'Jobs to configure:',
              '- CMDB Health Dashboard - Completeness Score Calculation',
              '- CMDB Health Dashboard - Compliance Score Calculation',
              '- CMDB Health Dashboard - Correctness Score Calculation',
              '',
              '| Field | Value |',
              '|---|---|',
              '| Run | Periodically |',
              '| Repeat Interval | 0 Days 12 Hours 00 Minutes |',
              '| Starting | Today 07:00:00 |',
              '| Active | Checked |',
              '',
              'Real-World: Align job frequency with discovery tool sync cadence.',
              '',
              '---',
              '',
              '## TASK 2 - Recommended Fields (Completeness)',
              '',
              'Navigation: All -> CI Class Manager -> Server -> Health -> Completeness -> Recommended Fields',
              '',
              'Fields to add: Location, Owned by, Support group',
              '',
              'Result: 110 of 114 CIs missing one or more fields (96% gap)',
              '',
              'Real-World: Mark fields used for incident routing asset tracking and ownership reporting.',
              '',
              '---',
              '',
              '## TASK 3 - Desired State Audit (Compliance)',
              '',
              'Navigation: CI Class Manager -> Windows Server -> Health -> Compliance',
              '',
              'Certification Filter:',
              '- Name: Windows Servers Filter',
              '- Table: Windows Server [cmdb_ci_win_server]',
              '- Conditions: None (includes ALL 123 Windows Servers)',
              '',
              'Certification Template:',
              '- Name: Windows Servers Template',
              '- Audit type: Desired State',
              '- Condition: OS is one of Windows 2012 R2 Standard | Windows 2016 Standard | Windows 2019 Datacenter',
              '',
              'Result: Compliance = 56% (54 of 123 servers failed - running unsupported OS)',
              '',
              '---',
              '',
              '## TASK 4 - Orphan Rules (Correctness)',
              '',
              'Navigation: CI Class Manager -> Email Server -> Health -> Correctness -> Orphan Rules',
              '',
              '| Field | Value |',
              '|---|---|',
              '| Relationship type | Runs On::Runs |',
              '| Related class | Server [cmdb_ci_server] |',
              '',
              'Result: 4 of 11 Email Servers healthy - 7 orphaned',
              '',
              '---',
              '',
              '## TASK 5 - Staleness Rules (Correctness)',
              '',
              '| CI Class | Staleness Period | Reason |',
              '|---|---|---|',
              '| Windows Server | 7 Days | Daily discovery cadence |',
              '| Unix Server | 14 Days | Weekly agentless discovery |',
              '',
              '---',
              '',
              '## TASK 6 - Remediate Duplicate CIs',
              '',
              'Deduplication Wizard for OWA-SD-01:',
              '',
              '| Step | Action |',
              '|---|---|',
              '| Select Main CI | Choose oldest record (Created 2012-05-25) |',
              '| Merge Attributes | Cost Center=Customer Support Company=ACME Australia Assigned to=Kyle Ferri |',
              '| Merge Relationships | Move all to Selected (main) CI |',
              '| Duplicate CI Actions | Delete the duplicate |',
              '',
              'Result: 122/122 non-duplicates. Single OWA-SD-01 with merged attributes.',
              '',
              '---',
              '',
              '## TASK 7 - Reclassification System Properties',
              '',
              'Navigation: All -> System Properties -> search glide.class',
              '',
              '| Property | Set To |',
              '|---|---|',
              '| glide.class.upgrade.auto | false |',
              '| glide.class.downgrade.auto | false |',
              '| glide.class.switch.auto | false |',
              '',
              '---',
              '',
              '## TASK 8 - CMDB Query Builder (Simple Query)',
              '',
              'Query: Windows Servers running approved OS versions',
              '- Starting node: Windows Server',
              '- Filter: OS is one of Windows 2012 R2 Standard | Windows 2016 Standard | Windows 2019 Datacenter',
              '',
              '---',
              '',
              '## TASK 9 - CMDB Query Builder (Non-CMDB Table)',
              '',
              'Query: Critical Incidents with No Owner',
              '',
              '| Node | Filter |',
              '|---|---|',
              '| Configuration Item | Owned by is empty |',
              '| Incident (Non-CMDB Tables tab) | Priority is 1 - Critical |',
              '',
              '---',
              '',
              '## TASK 10 - Remediation Workflow',
              '',
              'Workflow: Remediate Orphan WF',
              'Table: Orphan CI Remediation [orphan_ci_remediation]',
              '',
              'Script Activity:',
              "  current.short_description = 'Workflow launched for task number ' + current.number;",
              '  current.update();',
              '',
              'Flow: Begin -> Run Script -> End -> Publish',
              '',
              'Remediation Rule:',
              '- Name: Remediate Orphans',
              '- Task type: Orphan CI Remediation',
              '- Execution: Manual',
              '- Workflow: Remediate Orphan WF',
              '',
              'Enable: All -> Health Preference -> Health Metrics -> Orphan -> Create Task ON',
              '',
              '---',
              '',
              '## Quick Fire Exam Answers',
              '',
              '| Scenario | Answer |',
              '|---|---|',
              '| Compliance score = 0 | Wrong audit type - use Desired State or Scripted only |',
              '| Duplicate remediation not working | CIs not IRE-flagged - manual CIs excluded |',
              '| ACC script denied | Add to ACC Security Allow List |',
              '| IRE not working for sys_user | Add property + CI Identifiers module |',
              '| Discovery failing | Set glide.required.attribute.enabled = false (temporary) |',
              '| retire + approval + stale | CMDB Data Manager Policy |',
              '| Transform Map duplicates | CMDBTransformUtil().identifyAndReconcile() |',
          ]
          with open('docs/certifications/ServiceNow-CMDB-Health-Lab-Reference.md', 'w') as f:
              f.write('\n'.join(lines) + '\n')
          print('Created: ServiceNow-CMDB-Health-Lab-Reference.md')
          PYEOF

      - name: Create CIS-DF Study Guide
        run: |
          python3 << 'PYEOF'
          lines = [
              '# ServiceNow CIS-DF -- Complete Study Notes | CMDB + CSDM + Data Governance',
              '',
              '## 1. CMDB Core Tables',
              '',
              '| Table | Description |',
              '|---|---|',
              '| cmdb_ci | Base CI table - parent of all CI classes |',
              '| cmdb_ci_server | Server CIs |',
              '| cmdb_ci_database | Database CIs |',
              '| cmdb_ci_appl | Application CIs |',
              '| cmdb_rel_ci | Stores all CI relationships |',
              '| cmdb_multisource_data | Per-source attribute values (CMDB 360) |',
              '',
              '## 2. CI Lifecycle Stages',
              '',
              '| Stage | Meaning |',
              '|---|---|',
              '| Planned | CI planned but not yet procured |',
              '| Installed | CI physically installed |',
              '| In Use | CI actively being used |',
              '| Retired | CI no longer in active use |',
              '| Decommissioned | CI permanently removed from inventory |',
              '',
              '## 3. IRE -- Identification and Reconciliation Engine',
              '',
              'Identification: Does the CI already exist?',
              '- Match found -> Update existing CI',
              '- No match found -> Insert new CI',
              '- Uses: Serial Number, Name + IP Address, MAC Address',
              '',
              'Reconciliation: Which source wins?',
              '- Lower priority number = higher trust = wins',
              '- Discovery (100) > SCCM (200) > Manual Entry (300)',
              '',
              '| Type | Logic | Requires |',
              '|---|---|---|',
              '| Static | WHO sent the data (source priority) | Priority rankings |',
              '| Dynamic | WHAT the data says (most reported largest smallest) | Multisource CMDB |',
              '',
              'Data Refresh Rule: When a high-priority source stops updating,',
              'allow lower-priority source to update after a staleness threshold.',
              '',
              'IRE for Non-CMDB Tables:',
              '1. Add table to: glide.identification_engine.non_cmdb_tables',
              '2. Create Identification Rule in CI Identifiers module (NOT CI Class Manager)',
              '',
              '## 4. Multisource CMDB (CMDB 360)',
              '',
              '- Table: cmdb_multisource_data',
              '- Enable: glide.identification_engine.multisource_enabled = true',
              '- Use cases: source conflicts gap analysis 360-degree CI view',
              '- Requires: ITOM Discovery license',
              '',
              '## 5. CMDB Health Scorecards',
              '',
              '| Scorecard | What It Measures | Key Detail |',
              '|---|---|---|',
              '| Completeness | Required and recommended fields filled | Missing required = may block CI creation |',
              '| Correctness | No duplicates orphans stale CIs | Duplicates -> De-duplication Tasks |',
              '| Compliance | Passes audit rules | Only Desired State + Scripted Audit feed this score |',
              '',
              '## 6. CMDB Data Manager',
              '',
              '| Policy | Action |',
              '|---|---|',
              '| Retire | Changes lifecycle_stage to Retired |',
              '| Archive | Moves CI to archive tables |',
              '| Delete | Permanently removes CI |',
              '| Attest | Sends task to CI owner for confirmation |',
              '',
              '## 7. CSDM Domains',
              '',
              '| Domain | Number | Key CIs |',
              '|---|---|---|',
              '| Design | 1 | Business Capability Business Application Application Service |',
              '| Foundation | 2 | Business Process Location User Company |',
              '| Manage Technical Services | 3 | Application Service Technical Service Infrastructure CI |',
              '| Sell / Consume | 4 | Business Service Service Offering Service Catalog |',
              '| Build | 5 | Development components Code repositories |',
              '',
              '## 8. CSDM Maturity Model',
              '',
              '| Stage | Theme | Focus Question |',
              '|---|---|---|',
              '| Foundation | Data availability | Do we have the data? |',
              '| Crawl | Relationships | Are things connected? |',
              '| Walk | Service structure | Is the model structured? |',
              '| Run | Operations | Are we using it in ops? |',
              '| Fly | Business value | Are we driving business value? |',
              '',
              '## 9. CMDB Success Framework -- 3 Pillars',
              '',
              '| Pillar | Purpose | Tools |',
              '|---|---|---|',
              '| Ingest | Get data into CMDB reliably | Discovery Service Graph Connectors IntegrationHub ETL |',
              '| Govern | Ensure data quality and lifecycle | CMDB Health Data Manager CI Class Manager Duplicate Remediator |',
              '| Insight | Extract value from data | CMDB Query Builder Unified Map CSDM Dashboard |',
              '',
              '## 10. Final Quick Fire Cheat Sheet',
              '',
              '| Keyword Trigger | Answer |',
              '|---|---|',
              '| retire + approval + stale | CMDB Data Manager Policy |',
              '| IRE on sys_user / non-CMDB table | Add property + CI Identifiers module |',
              '| running / operational / production | Application Service (Service Instance) |',
              '| cost / risk / lifecycle / logical | Business Application |',
              '| mandatory field / Discovery failing | glide.required.attribute.enabled = false |',
              '| non-CMDB + Incident + CMDB query | Non-CMDB Tables feature in CMDB Query Builder |',
              '| remediation failing / duplicates | CIs not IRE-flagged |',
              '| audit runs but score zero | Wrong audit type - use Desired State or Scripted |',
              '| execution denied (ACC) | Add script to ACC Security Allow List |',
              '| App Service linked to Business App | Crawl maturity stage |',
              '| Incident / Change / Problem integration | Run maturity stage |',
              '| Dynamic CI Groups / patch management | Walk maturity stage |',
              '| no duplicates from Transform Map | CMDBTransformUtil().identifyAndReconcile() |',
              '| pillars of CMDB success | Ingest Govern Insight |',
          ]
          with open('docs/certifications/CIS-DF-Complete-Study-Guide.md', 'w') as f:
              f.write('\n'.join(lines) + '\n')
          print('Created: CIS-DF-Complete-Study-Guide.md')
          PYEOF

      - name: Commit and push all files
        run: |
          git config user.name "automation-bot"
          git config user.email "automation@portfolio.dev"
          git add docs/certifications/
          git diff --staged --quiet || git commit -m "Add ServiceNow certification knowledge base - CMDB Health CIS-ITOM CIS-DF"
          git push origin dev
