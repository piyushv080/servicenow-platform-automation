# ServiceNow CMDB Health — Complete Lab Reference (Yokohama)

## Lab Overview

| Field | Value |
|---|---|
| Course | CMDB Health Micro-Certification Simulator (Yokohama) |
| Role | CMDB Administrator (Cloud Dimensions) |
| Goal | Configure and maintain CMDB health across Completeness, Compliance, and Correctness |

---

## TASK 1 — Scheduled Jobs (Twice Daily at 7AM and 7PM)

**Navigation:** All → Scheduled Script Executions

**Jobs to configure:**
- CMDB Health Dashboard - Completeness Score Calculation
- CMDB Health Dashboard - Compliance Score Calculation
- CMDB Health Dashboard - Correctness Score Calculation

| Field | Value |
|---|---|
| Run | Periodically |
| Repeat Interval | 0 Days, 12 Hours, 00 Minutes |
| Starting | Today 07:00:00 |
| Active | Checked |

> **Real-World:** Align job frequency with your discovery tool sync cadence.
> If Discovery runs every 12 hours, health jobs should match so dashboards reflect fresh data.

---

## TASK 2 — Recommended Fields (Completeness)

**Navigation:** All → CI Class Manager → Server → Health → Completeness → Recommended Fields tab

**Add these fields:**
- Location
- Owned by
- Support group

**Verify:** CMDB Workspace → Health Dashboard → Unix and Windows Servers
- 110 of 114 CIs missing one or more recommended fields (96% gap)

> **Real-World:** Mark fields used for incident routing (Support group), asset tracking (Location),
> and ownership reporting (Owned by) as recommended.

---

## TASK 3 — Desired State Audit (Compliance)

**Navigation:** CI Class Manager → Windows Server → Health → Compliance

### Certification Filter
| Field | Value |
|---|---|
| Name | Windows Servers Filter |
| Table | Windows Server [cmdb_ci_win_server] |
| Conditions | None (includes ALL 123 Windows Servers) |

### Certification Template
| Field | Value |
|---|---|
| Name | Windows Servers Template |
| Filter | Windows Servers Filter |
| Audit type | Desired State |

**Attribute Condition:**
| Column | Operator | Values |
|---|---|---|
| Operating System | is one of | Windows 2012 R2 Standard, Windows 2016 Standard, Windows 2019 Datacenter |

### Audit
- Name: Windows Audit
- Deactivate all pre-existing baseline audits
- Run: CMDB Health Dashboard - Compliance Score Calculation

**Result:** Compliance = 56% (54/123 servers failed — running unsupported OS)

> **Real-World:** Use desired state audits to enforce OS patching standards, EOL tracking,
> and software license compliance.

---

## TASK 4 — Orphan Rules (Correctness)

**Navigation:** CI Class Manager → Email Server → Health → Correctness → Orphan Rules tab

| Field | Value |
|---|---|
| Relationship type | Runs On::Runs |
| Related class | Server [cmdb_ci_server] |

**Result:** Orphan metric = 36% (4/11 Email Servers healthy — 7 orphaned)

> **Real-World:** Orphan rules detect application servers with no hardware relationship —
> indicating discovery gaps or decommissioned hardware not properly recorded.

---

## TASK 5 — Staleness Rules (Correctness)

**Navigation:** CI Class Manager → [Class] → Health → Correctness → Staleness Rules tab

| CI Class | Staleness Period | Reason |
|---|---|---|
| Windows Server | 7 Days | Daily discovery cadence |
| Unix Server | 14 Days | Weekly agentless discovery |

> **Real-World:** Match staleness thresholds to your discovery schedule.
> Stale CIs trigger alerts before they cause automation failures.

---

## TASK 6 — Remediate Duplicate CIs

**Navigation:** CI Class Manager → Windows Server → Health → Correctness → Duplicates tab

**Deduplication Wizard for OWA-SD-01:**

| Step | Action |
|---|---|
| Select Main CI | Choose oldest record (Created: 2012-05-25) |
| Merge Attribute Values | Cost Center=Customer Support, Company=ACME Australia, Assigned to=Kyle Ferri |
| Merge Relationships | Move all to Selected (main) CI |
| Duplicate CI Actions | Delete the duplicate |

**Result:** 122/122 non-duplicates. Single OWA-SD-01 with merged attributes.

> **Real-World:** Always use the Remediation wizard — not manual deletion —
> to preserve relationship history.

---

## TASK 7 — Reclassification System Properties

**Navigation:** All → System Properties → search `glide.class`

| Property | Set To | Effect |
|---|---|---|
| glide.class.upgrade.auto | false | Prevents silent class upgrades |
| glide.class.downgrade.auto | false | Prevents silent class downgrades |
| glide.class.switch.auto | false | Forces manual reclassification review |

> **Real-World:** Automatic reclassification can silently break relationships and automation.
> Force manual review so CMDB managers validate before changes propagate.

---

## TASK 8 — CMDB Query Builder (Simple Query)

**Query:** Windows Servers running approved OS versions

| Setting | Value |
|---|---|
| Starting node | Windows Server |
| Filter | Operating System is one of: Windows 2012 R2 Standard, Windows 2016 Standard, Windows 2019 Datacenter |

> **Real-World:** Save reusable queries for compliance reviews and scheduled reporting.

---

## TASK 9 — CMDB Query Builder (Non-CMDB Table)

**Query:** Critical Incidents with No Owner

| Node | Filter |
|---|---|
| Configuration Item | Owned by is empty |
| Incident (Non-CMDB Tables tab) | Priority is 1 - Critical |

> **Real-World:** Focus CMDB cleanup on CIs actively causing incidents with no owner.
> Feed results into Problem Management for root cause analysis.

---

